services:
  - type: web
    name: sailing-score-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sailing-score-db
          property: connectionString

databases:
  - name: sailing-score-db
    plan: free
